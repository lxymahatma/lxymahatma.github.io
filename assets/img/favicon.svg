    <rect class="paper" x="140" y="96" width="252" height="312" rx="24" />
    <g class="lines" stroke-width="17" stroke-linecap="round">
      <line x1="180" y1="170" x2="352" y2="170" />
      <line x1="180" y1="216" x2="352" y2="216" />
      <line x1="180" y1="262" x2="300" y2="262" />
    </g>
    <g transform="rotate(42 300 340)">
      <rect class="penbody" x="276" y="150" width="46" height="250" rx="13" />
      <rect x="276" y="150" width="46" height="44" rx="11" fill="#f1c40f" />
